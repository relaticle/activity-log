<svg xmlns="http://www.w3.org/2000/svg" width="216" height="40" viewBox="0 0 216 40" fill="none">
  <!-- Three stacked log entries, fading toward history -->
  <rect x="4" y="6"  width="32" height="8" rx="3" fill="url(#al_brand_d)"/>
  <rect x="4" y="16" width="26" height="8" rx="3" fill="url(#al_brand_d)" opacity="0.75"/>
  <rect x="4" y="26" width="20" height="8" rx="3" fill="url(#al_brand_d)" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="48" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="800" fill="#fafafa" letter-spacing="-0.6">Activity Log</text>

  <defs>
    <linearGradient id="al_brand_d" x1="4" y1="6" x2="36" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
</svg>
