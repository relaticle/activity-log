<svg xmlns="http://www.w3.org/2000/svg" width="220" height="40" viewBox="0 0 220 40" fill="none">
  <!-- Timeline backbone -->
  <line x1="10" y1="10" x2="10" y2="30" stroke="#3f3f46" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Entry rows: dot + primary bar -->
  <circle cx="10" cy="10" r="3.5" fill="url(#al_g_blue_d)"/>
  <rect x="18" y="6" width="24" height="8" rx="2" fill="url(#al_g_blue_d)"/>

  <circle cx="10" cy="20" r="3.5" fill="url(#al_g_cyan_d)"/>
  <rect x="18" y="16" width="22" height="8" rx="2" fill="url(#al_g_cyan_d)"/>

  <circle cx="10" cy="30" r="3.5" fill="url(#al_g_green_d)"/>
  <rect x="18" y="26" width="20" height="8" rx="2" fill="url(#al_g_green_d)"/>

  <!-- Wordmark -->
  <text x="52" y="27" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#fafafa" letter-spacing="-0.5">Activity Log</text>

  <defs>
    <linearGradient id="al_g_blue_d" x1="6" y1="6" x2="42" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A3B4FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="al_g_cyan_d" x1="6" y1="16" x2="40" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="al_g_green_d" x1="6" y1="26" x2="38" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
</svg>
